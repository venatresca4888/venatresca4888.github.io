<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Lightning Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="page-tabs" role="tablist" aria-label="Main pages">
        <button class="page-tab active" type="button" data-page="code-page" role="tab" aria-selected="true" aria-label="Code" title="Code">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.4 16.6 4.8 12l4.6-4.6 1.4 1.4L7.6 12l3.2 3.2-1.4 1.4Zm5.2 0-1.4-1.4 3.2-3.2-3.2-3.2 1.4-1.4 4.6 4.6-4.6 4.6Z"/></svg>
        </button>
        <button class="page-tab" type="button" data-page="scripthub-page" role="tab" aria-selected="false" aria-label="ScriptHub" title="ScriptHub">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3h11A2.5 2.5 0 0 1 20 5.5v13A2.5 2.5 0 0 1 17.5 21h-11A2.5 2.5 0 0 1 4 18.5v-13Zm2 2.25h12V5.5a.5.5 0 0 0-.5-.5h-11a.5.5 0 0 0-.5.5v2.25Zm0 2V18.5a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 .5-.5V9.75H6Zm2 2.75h8v1.75H8V12.5Zm0 3.25h5.5v1.75H8v-1.75Z"/></svg>
        </button>
        <button class="page-tab" type="button" data-page="settings-page" role="tab" aria-selected="false" aria-label="Settings" title="Settings">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.8 3h2.4l.45 2.27c.46.16.9.35 1.31.6l1.92-1.29 1.7 1.7-1.29 1.92c.24.41.44.85.6 1.31l2.27.45v2.4l-2.27.45c-.16.46-.36.9-.6 1.31l1.29 1.92-1.7 1.7-1.92-1.29c-.41.24-.85.44-1.31.6L13.2 21h-2.4l-.45-2.27c-.46-.16-.9-.36-1.31-.6l-1.92 1.29-1.7-1.7 1.29-1.92c-.24-.41-.44-.85-.6-1.31L3.84 14.04v-2.4l2.27-.45c.16-.46.36-.9.6-1.31L5.42 7.96l1.7-1.7 1.92 1.29c.41-.24.85-.44 1.31-.6L10.8 3Zm1.2 6a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"/></svg>
        </button>
        <div class="window-controls" aria-label="Window controls">
            <button class="window-control" type="button" data-window-action="minimize" aria-label="Minimize" title="Minimize">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 18h14v-2H5v2Z"/></svg>
            </button>
            <button class="window-control" type="button" data-window-action="maximize" aria-label="Maximize" title="Maximize">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6v12h12V6H6Zm2 2h8v8H8V8Z"/></svg>
            </button>
            <button class="window-control close" type="button" data-window-action="close" aria-label="Close" title="Close">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7.4 6 4.6 4.6L16.6 6 18 7.4 13.4 12l4.6 4.6-1.4 1.4-4.6-4.6L7.4 18 6 16.6l4.6-4.6L6 7.4 7.4 6Z"/></svg>
            </button>
        </div>
    </div>
    <div id="main-container">
        <div class="page active" id="code-page" role="tabpanel">
            <div id="editor-area">
                <div class="toast-container"></div>
                <div id="tab-bar">
                    <div id="new-tab-btn">+</div>
                </div>
                <div id="container"></div>
            </div>
        </div>
        <div class="page" id="scripthub-page" role="tabpanel">
            <div id="saved-scripts-panel">
                <div class="scripthub-hero">
                    <div>
                        <div class="panel-kicker">ScriptBlox</div>
                        <div class="panel-title">Script Hub</div>
                    </div>
                    <button class="hub-action" id="refresh-scripts-btn" type="button" title="Refresh results" aria-label="Refresh results">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.45 10.94h-2.2A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h8V3l-3.35 3.35Z"/></svg>
                    </button>
                </div>
                <div class="search-container hub-search">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m19.6 21-6.3-6.3A7.2 7.2 0 1 1 15 13.3l6.3 6.3-1.7 1.4ZM9.2 14.4a5.2 5.2 0 1 0 0-10.4 5.2 5.2 0 0 0 0 10.4Z"/></svg>
                    <input type="text" class="search-box" id="script-search" placeholder="Search ScriptBlox..." autocomplete="off">
                </div>
                <div class="scripts-list" id="scripts-list">
                    <div id="no-scripts-message">Search for scripts to begin.</div>
                </div>
            </div>
        </div>
        <div class="page" id="settings-page" role="tabpanel">
            <div class="settings-header">
                <div>
                    <div class="settings-title">Settings</div>
                    <div class="settings-subtitle">Medium preferences</div>
                </div>
                <button class="settings-reset" type="button">Reset settings</button>
            </div>
            <div class="settings-content">
                <section class="settings-section">
                    <div class="settings-section-title">Window</div>
                    <div class="setting-row">
                        <strong>Always on top</strong>
                        <label class="setting-switch">
                            <input type="checkbox" data-setting="alwaysOnTop" checked>
                            <span></span>
                        </label>
                    </div>
                    <div class="setting-row">
                        <strong>Auto Attach</strong>
                        <label class="setting-switch">
                            <input type="checkbox" data-setting="autoAttach">
                            <span></span>
                        </label>
                    </div>
                    <div class="setting-row">
                        <strong>Show Terminal</strong>
                        <label class="setting-switch">
                            <input type="checkbox" data-setting="showTerminal" checked>
                            <span></span>
                        </label>
                    </div>
                </section>
                <section class="settings-section">
                    <div class="settings-section-title">Editor</div>
                    <div class="setting-row">
                        <strong>Font size</strong>
                        <input class="setting-slider" type="range" min="11" max="24" value="15" aria-label="Font size">
                        <span class="setting-value">15px</span>
                    </div>
                    <div class="setting-row">
                        <strong>Minimap</strong>
                        <label class="setting-switch">
                            <input type="checkbox" data-setting="minimap">
                            <span></span>
                        </label>
                    </div>
                    <div class="setting-row">
                        <strong>Autocomplete</strong>
                        <label class="setting-switch">
                            <input type="checkbox" data-setting="autocomplete" checked>
                            <span></span>
                        </label>
                    </div>
                </section>
                <section class="settings-section">
                    <div class="settings-section-title">Script Hub</div>
                    <div class="setting-row">
                        <strong>Script search</strong>
                        <label class="setting-switch">
                            <input type="checkbox" data-setting="scriptSearch" checked>
                            <span></span>
                        </label>
                    </div>
                    <div class="setting-row">
                        <strong>Load images</strong>
                        <label class="setting-switch">
                            <input type="checkbox" data-setting="loadImages" checked>
                            <span></span>
                        </label>
                    </div>
                    <div class="setting-row">
                        <strong>Execute buttons</strong>
                        <label class="setting-switch">
                            <input type="checkbox" data-setting="allowExecute" checked>
                            <span></span>
                        </label>
                    </div>
                    <div class="setting-row">
                        <strong>Copy buttons</strong>
                        <label class="setting-switch">
                            <input type="checkbox" data-setting="allowCopy" checked>
                            <span></span>
                        </label>
                    </div>
                </section>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/loader.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
